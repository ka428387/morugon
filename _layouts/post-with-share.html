layout: post
---

{{ content }}

{% include share-buttons.html %}

{% if page.tags.size > 0 %}
<div class="post-tags" style="margin: 1em 0; font-size: 0.9em;">
  {% for tag in page.tags %}
<a href="{{ '/tags/#' | append: tag | relative_url }}" style="display: inline-block; margin-right: 0.5em; padding: 0.2em 0.7em; background-color: #f0f0f0; border-radius: 20px; text-decoration: none; color: #555; font-size: 0.85em;">#{{ tag }}</a>
  {% endfor %}
</div>
{% endif %}
